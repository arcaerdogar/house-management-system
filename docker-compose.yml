# HouseMate Finance — local development stack
# Usage: docker compose up --build
#
# Redis runs in Docker; backend/frontend use service hostname `redis`.
# DATABASE_URL and AWS keys come from backend/.env (Neon / SES / S3).

services:
  redis:
    image: redis:7-alpine
    container_name: housemate-redis
    restart: unless-stopped
    ports:
      # Host'ta 6379 doluysa 6380 kullan (container içi yine 6379)
      - "127.0.0.1:6380:6379"
    volumes:
      - housemate_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile.dev
    container_name: housemate-backend
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "npm ci
      && npm run prisma:gen -w backend
      && npm run dev -w backend"
    env_file:
      - backend/.env
    environment:
      PORT: "3000"
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./backend:/app/backend
      - ./packages/shared:/app/packages/shared
      - backend_root_node_modules:/app/node_modules
      - backend_pkg_node_modules:/app/backend/node_modules
      - backend_shared_node_modules:/app/packages/shared/node_modules
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile.dev
    container_name: housemate-frontend
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "npm ci
      && npm run dev -w frontend -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: ""
      VITE_API_TARGET: http://backend:3000
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - ./packages/shared:/app/packages/shared
      - frontend_root_node_modules:/app/node_modules
      - frontend_pkg_node_modules:/app/frontend/node_modules
      - frontend_shared_node_modules:/app/packages/shared/node_modules
    depends_on:
      - backend

volumes:
  housemate_redis_data:
  backend_root_node_modules:
  backend_pkg_node_modules:
  backend_shared_node_modules:
  frontend_root_node_modules:
  frontend_pkg_node_modules:
  frontend_shared_node_modules:
